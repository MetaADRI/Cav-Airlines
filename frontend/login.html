<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAV-Zambia Airlines - Login</title>
    <!-- Google Fonts - Oxygen font family -->
    <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <!-- Left container with login form -->
    <div class="login-container">
        <!-- Page heading -->
        <h1>Log into your account</h1>
        
        <!-- Login form - submits to backend/login.php -->
        <form id="login-form">
            <!-- Email input field with floating label -->
            <div class="form-group">
                <input type="email" name="email" id="email" required>
                <label for="email" class="floating-label">Email Address</label>
            </div>
            
            <!-- Password input field with floating label -->
            <div class="form-group">
                <input type="password" name="password" id="password" required>
                <label for="password" class="floating-label">Password*</label>
            </div>
            
            <!-- Login button -->
            <button type="submit" class="login-btn">Log in</button>
            <div id="login-message" class="login-message"></div>
            <!-- Registration link for users without accounts -->
            <p class="register-text">Don't have an account yet? <a href="register.html" class="register-link">Register</a></p>
        </form>
        
        <!-- CAVAIR banner at the bottom of the form section -->
        <div class="cavair-banner">CAVAIR</div>
    </div>
    
    <!-- Right container with background image -->
    <div class="image-container"></div>
    
    <!-- JavaScript for form functionality -->
    <script src="js/login.js"></script>
</body>
</html>
