<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title -->
    <title>CAV-Zambia Airlines - Create Account</title>
    <!-- Google Fonts - Oxygen font family -->
    <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <!-- Left container with registration form -->
    <div class="register-container">
        <!-- Page heading -->
        <h1>Create Account</h1>
        
        <!-- Registration form - submits to backend/register.php -->
        <form id="register-form">
            <!-- Full Name input field with floating label -->
            <div class="form-group">
                <input type="text" name="full_name" id="full_name" required>
                <label for="full_name" class="floating-label">Full Name</label>
            </div>
            
            <!-- Email input field with floating label -->
            <div class="form-group">
                <input type="email" name="email" id="email" required>
                <label for="email" class="floating-label">Email Address</label>
            </div>
            
            <!-- Phone Number input field with floating label (optional field) -->
            <div class="form-group">
                <input type="tel" name="phone" id="phone">
                <label for="phone" class="floating-label">Phone Number (optional)</label>
            </div>
            
            <!-- Password input field with floating label -->
            <div class="form-group">
                <input type="password" name="password" id="password" required>
                <label for="password" class="floating-label">Password</label>
            </div>
            
            <!-- Register button -->
            <button type="submit" class="register-btn">Register</button>
<div id="register-message" class="register-message"></div>
            
            <!-- Login link for users who already have accounts -->
            <p class="login-text">Do you have an account? <a href="../backend/login.php" class="login-link">Login</a></p>
        </form>
        
        <!-- CAVAIR banner at the bottom of the form section -->
        <div class="cavair-banner">CAVAIR</div>
    </div>
    
    <!-- Right container with background image -->
    <div class="image-container"></div>
    
    <!-- JavaScript for form functionality -->
    <script src="js/register.js"></script>
</body>
</html>
